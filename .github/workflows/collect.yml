name: Collect MMA News & Events

on:
  schedule:
    - cron: '0 21 * * *'   # 毎日 06:00 JST (UTC+9)
  workflow_dispatch:        # 手動実行も可能

permissions:
  contents: write           # データ更新をコミット・プッシュするため

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run collector
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scraper/collect.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: auto-update news/events/champions [skip ci]"
          git push
